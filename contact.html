<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Melvyn Cross</title>
  <meta name="description" content="Get in touch with Melvyn Cross — e-commerce builder, open to new opportunities." />

  <script>(function(){var t=localStorage.getItem('mc_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter+Tight:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="contact-page">

  <!-- ── CUSTOM CURSOR ── -->
  <div class="cursor-dot"  aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <!-- ── NAV ── -->
  <nav class="nav blog-nav">
    <a href="/" class="nav__mark">MC</a>
    <div class="nav__meta">
      <a href="/contact" class="nav__contact-cta nav__blog-link--active" style="animation:none;opacity:1;">Contact me</a>
      <a href="/blog" class="nav__blog-link">The Dispatch</a>
      <button class="nav__theme" id="theme-toggle" aria-label="Toggle dark mode">☽</button>
    </div>
  </nav>

  <!-- ── HERO ── -->
  <section class="cp-hero">
    <div class="cp-hero__inner">
      <span class="cp-hero__pre">Let's connect</span>
      <h1 class="cp-hero__title">Get in <em>touch</em>.</h1>
    </div>
  </section>

  <!-- ── BODY ── -->
  <div class="cp-body">
    <div class="cp-body__inner">

      <!-- Left: form -->
      <div>
        <div class="cf-wrap" style="margin-top:0;padding-top:0;border-top:none;max-width:100%;">
          <p class="cf-eyebrow">Send a message</p>

          <form class="cf" id="cf" novalidate>
            <div class="cf__row">
              <label class="cf__label" for="cf-name">Name</label>
              <input class="cf__input" type="text" id="cf-name" name="name"
                placeholder="Your name" autocomplete="name" required />
            </div>
            <div class="cf__row">
              <label class="cf__label" for="cf-email">Email</label>
              <input class="cf__input" type="email" id="cf-email" name="email"
                placeholder="your@email.com" autocomplete="email" required />
            </div>
            <div class="cf__row">
              <label class="cf__label" for="cf-msg">Message</label>
              <textarea class="cf__input cf__textarea" id="cf-msg" name="message"
                placeholder="What's on your mind?" rows="5" required></textarea>
            </div>

            <div class="cf__actions">
              <button class="cf__submit" id="cf-submit" type="submit">
                <span id="cf-btn-text">Send message</span>
                <span class="cf__arrow">→</span>
              </button>
              <p class="cf__error" id="cf-error" hidden></p>
            </div>
          </form>

          <div class="cf__success" id="cf-success" hidden>
            <p class="cf__success-msg">Message sent.<br><em>I'll be in touch.</em></p>
          </div>
        </div>
      </div>

      <!-- Right: contact links -->
      <div class="cp-links">
        <p class="cp-links__label">Or reach out directly</p>

        <a href="mailto:melvyn.cross05@gmail.com" class="cp-link">
          <span class="cp-link__label">Email</span>
          <span class="cp-link__value">melvyn.cross05@gmail.com</span>
          <span class="cp-link__arrow">→</span>
        </a>

        <a href="https://www.linkedin.com/in/melvyn-botlhe" target="_blank" rel="noopener" class="cp-link">
          <span class="cp-link__label">LinkedIn</span>
          <span class="cp-link__value">/in/melvyn-botlhe</span>
          <span class="cp-link__arrow">→</span>
        </a>

        <a href="tel:+33622527079" class="cp-link">
          <span class="cp-link__label">Phone</span>
          <span class="cp-link__value">+33 6 22 52 70 79</span>
          <span class="cp-link__arrow">→</span>
        </a>
      </div>

    </div>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="foot blog-foot">
    <div class="foot__row">
      <span class="foot__col"><a href="/" class="foot__blog-link">← Portfolio</a></span>
      <span class="foot__col foot__col--center">© 2026 Melvyn Cross</span>
      <span class="foot__col foot__col--right"><a href="/blog" class="foot__blog-link">The Dispatch</a></span>
    </div>
  </footer>

  <script>
    // ── Theme ──
    (function(){
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      const set = t => {
        document.documentElement.setAttribute('data-theme', t);
        btn.textContent = t === 'dark' ? '☀' : '☽';
        localStorage.setItem('mc_theme', t);
      };
      set(document.documentElement.getAttribute('data-theme') || 'light');
      btn.addEventListener('click', () =>
        set(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
    })();

    // ── Custom cursor ──
    (function(){
      if (!window.matchMedia('(pointer: fine)').matches) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const dot = document.querySelector('.cursor-dot');
      const ring = document.querySelector('.cursor-ring');
      if (!dot || !ring) return;
      let mX=0,mY=0,dX=0,dY=0,rX=0,rY=0,visible=false;
      document.addEventListener('mousemove', e => {
        mX=e.clientX; mY=e.clientY;
        if (!visible) { dot.classList.add('cursor-dot--visible'); ring.classList.add('cursor-ring--visible'); visible=true; }
      });
      document.addEventListener('mouseleave', () => { dot.classList.add('cursor-dot--hidden'); ring.classList.add('cursor-ring--hidden'); dot.classList.remove('cursor-dot--visible'); ring.classList.remove('cursor-ring--visible'); visible=false; });
      document.addEventListener('mouseenter', () => { dot.classList.add('cursor-dot--visible'); ring.classList.add('cursor-ring--visible'); dot.classList.remove('cursor-dot--hidden'); ring.classList.remove('cursor-ring--hidden'); visible=true; });
      document.addEventListener('mousedown', () => {
        const r=document.createElement('div'); r.className='cursor-ripple'; r.style.left=mX+'px'; r.style.top=mY+'px';
        document.body.appendChild(r); r.addEventListener('animationend',()=>r.remove(),{once:true});
      });
      document.querySelectorAll('a,button,[role="button"]').forEach(el => {
        el.addEventListener('mouseenter',()=>{ dot.classList.add('cursor-dot--hover'); ring.classList.add('cursor-ring--hover'); });
        el.addEventListener('mouseleave',()=>{ dot.classList.remove('cursor-dot--hover'); ring.classList.remove('cursor-ring--hover'); });
      });
      const tick=()=>{ dX+=(mX-dX)*0.15; dY+=(mY-dY)*0.15; rX+=(mX-rX)*0.065; rY+=(mY-rY)*0.065; dot.style.transform=`translate(${dX}px,${dY}px) translate(-50%,-50%)`; ring.style.transform=`translate(${rX}px,${rY}px) translate(-50%,-50%)`; requestAnimationFrame(tick); };
      tick();
    })();

    // ── Contact form ──
    (function(){
      const form    = document.getElementById('cf');
      if (!form) return;
      const btnEl   = document.getElementById('cf-submit');
      const btnText = document.getElementById('cf-btn-text');
      const errorEl = document.getElementById('cf-error');
      const success = document.getElementById('cf-success');

      form.addEventListener('submit', async e => {
        e.preventDefault();
        const name    = document.getElementById('cf-name').value.trim();
        const email   = document.getElementById('cf-email').value.trim();
        const message = document.getElementById('cf-msg').value.trim();

        if (!name || !email || !message) {
          errorEl.textContent = 'Please fill in all fields.';
          errorEl.hidden = false;
          return;
        }

        btnEl.disabled = true;
        btnText.textContent = 'Sending…';
        errorEl.hidden = true;

        try {
          const res  = await fetch('/api/contact', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ name, email, message }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Something went wrong.');
          form.hidden    = true;
          success.hidden = false;
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.hidden      = false;
          btnEl.disabled      = false;
          btnText.textContent = 'Send message';
        }
      });
    })();
  </script>
</body>
</html>
