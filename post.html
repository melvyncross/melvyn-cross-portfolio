<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Dynamic meta — filled by post.js -->
  <title>Loading… — Melvyn Cross</title>
  <meta name="description" content="" />
  <meta property="og:type"        content="article" />
  <meta property="og:url"         content="" />
  <meta property="og:title"       content="" />
  <meta property="og:description" content="" />
  <meta property="og:image"       content="" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:image"       content="" />

  <!-- JSON-LD — filled by post.js -->
  <script type="application/ld+json" id="jsonld-article">{}</script>

  <!-- Flash-prevention -->
  <script>(function(){var t=localStorage.getItem('mc_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter+Tight:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="post-page">

  <!-- ── SCROLL PROGRESS BAR ── -->
  <div class="post-progress" id="post-progress" role="progressbar" aria-label="Reading progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div class="post-progress__fill" id="post-progress-fill"></div>
  </div>

  <!-- ── NAV ── -->
  <nav class="nav">
    <a href="/" class="nav__mark">MC</a>
    <div class="nav__meta">
      <a href="/blog" class="nav__blog-link">Blog</a>
      <button class="nav__theme" id="theme-toggle" aria-label="Toggle dark mode">☽</button>
    </div>
  </nav>

  <!-- ── LOADING STATE ── -->
  <div class="post-loading" id="post-loading" aria-live="polite">
    <div class="post-loading__inner">
      <div class="post-skeleton post-skeleton--hero"></div>
      <div class="post-skeleton post-skeleton--title"></div>
      <div class="post-skeleton post-skeleton--line"></div>
      <div class="post-skeleton post-skeleton--line post-skeleton--short"></div>
      <div class="post-skeleton post-skeleton--line"></div>
    </div>
  </div>

  <!-- ── 404 STATE ── -->
  <div class="post-notfound" id="post-notfound" hidden>
    <div class="post-notfound__inner">
      <p class="post-notfound__code">404</p>
      <h1 class="post-notfound__title">Post not found.</h1>
      <a href="/blog" class="post-notfound__back">← Back to Blog</a>
    </div>
  </div>

  <!-- ── ERROR STATE ── -->
  <div class="post-notfound" id="post-fetcherror" hidden>
    <div class="post-notfound__inner">
      <p class="post-notfound__code">—</p>
      <h1 class="post-notfound__title">Could not load post.</h1>
      <p class="post-notfound__sub">Check your connection and try refreshing.</p>
      <a href="/blog" class="post-notfound__back">← Back to Blog</a>
    </div>
  </div>

  <!-- ── POST CONTENT (filled by post.js) ── -->
  <article class="post-article" id="post-article" hidden>

    <!-- Cover image -->
    <div class="post-cover" id="post-cover"></div>

    <!-- Breadcrumb -->
    <nav class="post-breadcrumb" aria-label="Breadcrumb" id="post-breadcrumb">
      <a href="/" class="post-breadcrumb__link">Home</a>
      <span class="post-breadcrumb__sep" aria-hidden="true">→</span>
      <a href="/blog" class="post-breadcrumb__link">Blog</a>
      <span class="post-breadcrumb__sep" aria-hidden="true">→</span>
      <span class="post-breadcrumb__current" aria-current="page" id="breadcrumb-title">…</span>
    </nav>

    <!-- Post header -->
    <header class="post-header" id="post-header">
      <div class="post-header__top">
        <span class="post-header__cat" id="post-cat"></span>
        <div class="post-header__tags" id="post-tags"></div>
      </div>
      <h1 class="post-header__title" id="post-title"></h1>
      <div class="post-header__byline">
        <div class="post-author">
          <div class="post-author__avatar" aria-hidden="true">MC</div>
          <div class="post-author__info">
            <span class="post-author__name">Melvyn Cross</span>
            <span class="post-author__role">E-Commerce Builder</span>
          </div>
        </div>
        <div class="post-header__details">
          <time class="post-header__date" id="post-date"></time>
          <span class="post-header__read" id="post-read"></span>
        </div>
      </div>
    </header>

    <!-- Post body layout: TOC + content -->
    <div class="post-layout">

      <!-- Table of contents (desktop sidebar) -->
      <aside class="post-toc" id="post-toc" aria-label="Table of contents">
        <p class="post-toc__label">Contents</p>
        <nav class="post-toc__list" id="post-toc-list"></nav>
      </aside>

      <!-- Body content -->
      <div class="post-body" id="post-body"></div>

    </div>

    <!-- Share bar -->
    <footer class="post-share" id="post-share">
      <p class="post-share__label">Share this</p>
      <div class="post-share__buttons">
        <button class="post-share__btn post-share__btn--twitter" id="share-twitter" title="Share on X / Twitter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.629zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          <span>Twitter</span>
        </button>
        <button class="post-share__btn post-share__btn--linkedin" id="share-linkedin" title="Share on LinkedIn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          <span>LinkedIn</span>
        </button>
        <button class="post-share__btn" id="share-copy" title="Copy link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          <span id="share-copy-label">Copy link</span>
        </button>
      </div>
    </footer>

    <!-- Prev / Next navigation -->
    <nav class="post-nav" id="post-nav" aria-label="Post navigation">
      <a class="post-nav__prev" id="post-nav-prev" href="#" hidden>
        <span class="post-nav__dir">← Previous</span>
        <span class="post-nav__ptitle" id="post-nav-prev-title"></span>
      </a>
      <a class="post-nav__next" id="post-nav-next" href="#" hidden>
        <span class="post-nav__dir">Next →</span>
        <span class="post-nav__ptitle" id="post-nav-next-title"></span>
      </a>
    </nav>

  </article>

  <!-- ── FOOTER ── -->
  <footer class="foot">
    <div class="foot__row">
      <span class="foot__col">© 2026 Melvyn Cross</span>
      <span class="foot__col foot__col--center">Built in Lille. Hosted on Vercel.</span>
      <span class="foot__col foot__col--right">
        <a href="/blog" class="foot__blog-link">Blog</a>
      </span>
    </div>
  </footer>

  <script type="module" src="post.js"></script>
</body>
</html>
